version: "3"

vars:
  UNIFY_BUILD_TOOL: dotnet tool run unify-build --
  GODOT: 'C:\lunar-horse\tools\Godot_v4.6.1-stable_mono_win64\Godot_v4.6.1-stable_mono_win64.exe'
  CONTENT_PROJECT: project/hosts/content-authoring
  APP_PROJECT: project/hosts/complete-app
  ARTIFACTS_DIR: '{{.ROOT_DIR}}/build/_artifacts'
  APP_DIR: '{{.ARTIFACTS_DIR}}/complete-app'
  APP_EXE: '{{.APP_DIR}}/complete-app.exe'

env:
  GODOT4_BIN: "{{.GODOT}}"

tasks:
  # ============================================================================
  # Build Tasks
  # ============================================================================

  "build:godot":
    desc: Build and export the Godot application
    cmds:
      - cmd: dotnet tool restore
      - cmd: "{{.UNIFY_BUILD_TOOL}} BuildGodot --configuration Release"

  "build:godot:desktop":
    desc: Build Godot for desktop platforms only
    cmds:
      - cmd: dotnet tool restore
      - cmd: "{{.UNIFY_BUILD_TOOL}} BuildGodotDesktop --configuration Release"

  "build:app":
    desc: Export complete-app executable
    deps: ["ensure:dirs"]
    cmds:
      - '"{{.GODOT}}" --headless --path "{{.APP_PROJECT}}" --export-release "Windows Desktop" "{{.APP_EXE}}"'
    sources:
      - "{{.APP_PROJECT}}/**/*.gd"
      - "{{.APP_PROJECT}}/**/*.cs"
      - "{{.APP_PROJECT}}/**/*.csproj"
      - "{{.APP_PROJECT}}/**/*.tscn"
      - "{{.APP_PROJECT}}/**/*.cfg"
      - "{{.APP_PROJECT}}/project.godot"
    generates:
      - "{{.APP_EXE}}"

  # ============================================================================
  # Bundle Build Tasks
  # ============================================================================

  "build:bundle:panel-welcome":
    desc: Build panel-welcome bundle PCK
    deps: ["ensure:dirs"]
    cmds:
      - mkdir -p "{{.APP_DIR}}/bundles"
      - '"{{.GODOT}}" --headless --path "{{.CONTENT_PROJECT}}" --export-pack "panel-welcome PCK" "{{.APP_DIR}}/bundles/panel-welcome.pck"'

  "build:bundle:hud-menubar":
    desc: Build hud-menubar bundle PCK
    deps: ["ensure:dirs"]
    cmds:
      - mkdir -p "{{.APP_DIR}}/bundles"
      - '"{{.GODOT}}" --headless --path "{{.CONTENT_PROJECT}}" --export-pack "hud-menubar PCK" "{{.APP_DIR}}/bundles/hud-menubar.pck"'

  "build:bundle:hud-statusbar":
    desc: Build hud-statusbar bundle PCK
    deps: ["ensure:dirs"]
    cmds:
      - mkdir -p "{{.APP_DIR}}/bundles"
      - '"{{.GODOT}}" --headless --path "{{.CONTENT_PROJECT}}" --export-pack "hud-statusbar PCK" "{{.APP_DIR}}/bundles/hud-statusbar.pck"'

  "build:bundle:panel-scene-tree":
    desc: Build panel-scene-tree bundle PCK
    deps: ["ensure:dirs"]
    cmds:
      - mkdir -p "{{.APP_DIR}}/bundles"
      - '"{{.GODOT}}" --headless --path "{{.CONTENT_PROJECT}}" --export-pack "panel-scene-tree PCK" "{{.APP_DIR}}/bundles/panel-scene-tree.pck"'

  "build:bundle:panel-inspector":
    desc: Build panel-inspector bundle PCK
    deps: ["ensure:dirs"]
    cmds:
      - mkdir -p "{{.APP_DIR}}/bundles"
      - '"{{.GODOT}}" --headless --path "{{.CONTENT_PROJECT}}" --export-pack "panel-inspector PCK" "{{.APP_DIR}}/bundles/panel-inspector.pck"'

  "build:bundle:panel-timeline":
    desc: Build panel-timeline bundle PCK
    deps: ["ensure:dirs"]
    cmds:
      - mkdir -p "{{.APP_DIR}}/bundles"
      - '"{{.GODOT}}" --headless --path "{{.CONTENT_PROJECT}}" --export-pack "panel-timeline PCK" "{{.APP_DIR}}/bundles/panel-timeline.pck"'

  "build:bundle:panel-viewport":
    desc: Build panel-viewport bundle PCK
    deps: ["ensure:dirs"]
    cmds:
      - mkdir -p "{{.APP_DIR}}/bundles"
      - '"{{.GODOT}}" --headless --path "{{.CONTENT_PROJECT}}" --export-pack "panel-viewport PCK" "{{.APP_DIR}}/bundles/panel-viewport.pck"'

  "build:bundles":
    desc: Build all bundles
    deps:
      - "build:bundle:panel-welcome"
      - "build:bundle:hud-menubar"
      - "build:bundle:hud-statusbar"
      - "build:bundle:panel-scene-tree"
      - "build:bundle:panel-inspector"
      - "build:bundle:panel-timeline"
      - "build:bundle:panel-viewport"

  # ============================================================================
  # Run Tasks
  # ============================================================================

  "run:complete-app":
    desc: Run the exported complete-app
    cmds:
      - '"{{.APP_EXE}}"'

  "run:complete-app:editor":
    desc: Open complete-app project in Godot editor
    cmds:
      - '"{{.GODOT}}" --path "{{.APP_PROJECT}}" --editor'

  "run:content-authoring":
    desc: Open content-authoring project in Godot editor
    cmds:
      - '"{{.GODOT}}" --path "{{.CONTENT_PROJECT}}" --editor'

  # ============================================================================
  # HUD Generation
  # ============================================================================

  "generate:hud":
    desc: Generate HUD .tscn from boom-hud DSL
    cmds:
      - >-
        dotnet run --project C:/lunar-horse/plate-projects/boom-hud/dotnet/src/BoomHud.Cli/BoomHud.Cli.csproj
        -- generate design/dock-container.json
        --target godot --output project/hosts/complete-app/scenes
        --namespace BusyOffice --tscn --tscn-no-script

  # ============================================================================
  # Utility Tasks
  # ============================================================================

  "ensure:dirs":
    desc: Ensure artifacts directories exist
    internal: true
    cmds:
      - mkdir -p "{{.APP_DIR}}"
